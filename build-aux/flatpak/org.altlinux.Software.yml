id: org.altlinux.Software.Devel
runtime: org.gnome.Platform
runtime-version: master
sdk: org.gnome.Sdk
command: atomic-control-center
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --socket=wayland
  - --talk-name=org.altlinux.APM
  - --system-talk-name=org.altlinux.APM
modules:
  - name: libapi-base
    buildsystem: meson
    sources:
      - type: git
        url: https://altlinux.space/rirusha/libapi-base.git
        branch: main

  - name: atomic-control-center
    builddir: true
    buildsystem: meson
    config-opts:
      - -Dis_devel=true
    sources:
      - type: dir
        path: ../../
