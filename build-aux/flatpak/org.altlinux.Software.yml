id: org.altlinux.Software.Devel
runtime: org.gnome.Platform
runtime-version: master
sdk: org.gnome.Sdk
command: alt-software
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --socket=wayland
  - --talk-name=org.altlinux.APM
  - --system-talk-name=org.altlinux.APM
modules:
  - name: libapi-base
    buildsystem: meson
    sources:
      - type: git
        url: https://altlinux.space/rirusha/libapi-base.git
        branch: main

  - name: libcase_dep
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://altlinux.space/rirusha/libcase_dep.git
        branch: main

  - name: alt-software
    builddir: true
    buildsystem: meson
    config-opts:
      - -Dnightly=true
    sources:
      - type: dir
        path: ../../
